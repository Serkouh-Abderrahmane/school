<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription — Cultulangues</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
</head>
<body>

  <!-- ═══ AUTH PAGE ═══ -->
  <div class="auth-page">
  <div style="position:absolute;inset:0;z-index:0;opacity:0.04;pointer-events:none"><img src="../img/hero-maitrisez-langues.png" alt="" style="width:100%;height:100%;object-fit:cover"></div>
    <div class="auth-card" style="max-width: 540px;">
      <a href="../index.html" class="logo">
        <img src="../img/image-Photoroom.png" alt="Cultulangues" class="logo-img">
      </a>
      <h2>Créer votre compte</h2>
      <p class="auth-subtitle">Rejoignez Cultulangues et commencez votre parcours linguistique</p>

      <form class="needs-validation">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Prénom <span class="required">*</span></label>
            <input type="text" class="form-input" required placeholder="Votre prénom">
          </div>
          <div class="form-group">
            <label class="form-label">Nom <span class="required">*</span></label>
            <input type="text" class="form-input" required placeholder="Votre nom">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email <span class="required">*</span></label>
          <input type="email" class="form-input" required placeholder="votre@email.com">
        </div>
        <div class="form-group">
          <label class="form-label">Mot de passe <span class="required">*</span></label>
          <div style="position: relative;">
            <input type="password" class="form-input" required placeholder="Minimum 8 caractères">
            <button type="button" class="password-toggle" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 1rem;">🔒</button>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Niveau de langue</label>
            <select class="form-select">
              <option>Débutant (A1)</option>
              <option>Élémentaire (A2)</option>
              <option>Intermédiaire (B1)</option>
              <option selected>Intermédiaire+ (B2)</option>
              <option>Avancé (C1)</option>
              <option>Expert (C2)</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Objectif principal</label>
            <select class="form-select">
              <option>TCF Québec</option>
              <option>TCF Canada</option>
              <option>Oral B ou C</option>
              <option>Perfectionnement général</option>
              <option>Immersion culturelle</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-checkbox">
            <input type="checkbox" required> J'accepte les <a href="#" style="color: var(--color-emerald); font-weight: 600;">conditions d'utilisation</a>
          </label>
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg">Créer mon compte</button>
      </form>

      <div class="auth-footer mt-lg">
        Déjà un compte ? <a href="login.html">Se connecter</a>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
</body>
</html>
