    <main class="dashboard-main">
      <header class="dashboard-topbar">
        <div class="topbar-left"><button class="sidebar-toggle">☰</button><h1 class="topbar-title">Profil</h1></div>
        <div class="topbar-right"><div class="topbar-search"><span class="topbar-search-icon">🔍</span><input type="text" placeholder="Rechercher..."></div><button class="topbar-notification">🔔<span class="notification-dot"></span></button><div class="avatar avatar-sm">M</div></div>

      <div class="dashboard-content">
        <div class="card mb-lg">
          <div class="flex items-center" style="gap: var(--space-lg);">
            <div class="avatar avatar-xl">M</div>
            <div>
              <h2>Maria Silva</h2>
              <p style="color: var(--color-text-secondary);">maria.silva@email.com</p>
              <span class="badge badge-blue">Niveau B2</span>
            </div>
            <button class="btn btn-outline btn-sm" style="margin-left: auto;">Modifier la photo</button>
          </div>
        </div>
        <div class="grid-2">
          <div class="card">
            <div class="card-header"><h3 class="card-title">Informations personnelles</h3></div>
            <div class="card-body">
              <form>
                <div class="form-row">
                  <div class="form-group"><label class="form-label">Prénom</label><input type="text" class="form-input" value="Maria"></div>
                  <div class="form-group"><label class="form-label">Nom</label><input type="text" class="form-input" value="Silva"></div>
                </div>
                <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" value="maria.silva@email.com"></div>
                <div class="form-group"><label class="form-label">Téléphone</label><input type="tel" class="form-input" value="+33 6 12 34 56 78"></div>
                <button class="btn btn-primary">Enregistrer</button>
              </form>
            </div>
          </div>
          <div class="card">
            <div class="card-header"><h3 class="card-title">Préférences linguistiques</h3></div>
            <div class="card-body">
              <form>
                <div class="form-group"><label class="form-label">Niveau actuel</label><input type="text" class="form-input" value="Intermédiaire+ (B2)" readonly></div>
                <div class="form-group"><label class="form-label">Objectif</label><select class="form-select"><option>TCF Québec</option><option>TCF Canada</option><option>Oral B ou C</option></select></div>
                <div class="form-group"><label class="form-label">Langue maternelle</label><input type="text" class="form-input" value="Portugais"></div>
                <button class="btn btn-primary">Mettre à jour</button>
              </form>
            </div>
          </div>
        </div>
