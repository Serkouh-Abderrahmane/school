<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paramètres — Admin</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="dashboard-layout">
    <aside class="dashboard-sidebar">
      <div class="sidebar-header"><a href="../index.html" class="logo"><img src="../img/image-Photoroom.png" alt="Cultulangues" class="logo-img"></a></div>
      <div class="sidebar-user"><div class="avatar">A</div><div class="sidebar-user-info"><div class="sidebar-user-name">Admin</div><div class="sidebar-user-role">Administrateur</div></div></div>
      <nav class="sidebar-nav">
        <div class="sidebar-section">Gestion</div>
        <a class="sidebar-item" data-href="dashboard.html"><span class="sidebar-item-icon">📊</span> Vue d'ensemble</a>
        <a class="sidebar-item" data-href="programs.html"><span class="sidebar-item-icon">📚</span> Programmes</a>
        <a class="sidebar-item" data-href="teachers.html"><span class="sidebar-item-icon">👩‍🏫</span> Enseignants</a>
        <a class="sidebar-item" data-href="students.html"><span class="sidebar-item-icon">👥</span> Étudiants</a>
        <a class="sidebar-item" data-href="bookings.html"><span class="sidebar-item-icon">📋</span> Réservations</a>
        <a class="sidebar-item" data-href="payments.html"><span class="sidebar-item-icon">💳</span> Paiements</a>
        <a class="sidebar-item" data-href="calendar.html"><span class="sidebar-item-icon">📅</span> Calendrier</a>
        <a class="sidebar-item" data-href="analytics.html"><span class="sidebar-item-icon">📈</span> Analytiques</a>
        <div class="sidebar-section">Système</div>
        <a class="sidebar-item active" data-href="settings.html"><span class="sidebar-item-icon">⚙️</span> Paramètres</a>
      </nav>
      <div class="sidebar-footer"><a class="sidebar-item" data-href="../index.html"><span class="sidebar-item-icon">🚪</span> Déconnexion</a></div>
    </aside>
    <div class="mobile-nav-overlay sidebar-overlay"></div>
    <main class="dashboard-main">
      <header class="dashboard-topbar">
        <div class="topbar-left"><button class="sidebar-toggle">☰</button><h1 class="topbar-title">Paramètres</h1></div>
        <div class="topbar-right"><div class="topbar-search"><span class="topbar-search-icon">🔍</span><input type="text" placeholder="Rechercher..."></div><button class="topbar-notification">🔔<span class="notification-dot"></span></button><div class="avatar avatar-sm">A</div></div>
      </header>
      <div class="dashboard-content">
        <div class="tabs-container">
          <div class="tabs" data-target="settings-tabs">
            <button class="tab active" data-tab="general">Général</button>
            <button class="tab" data-tab="payment">Paiement</button>
            <button class="tab" data-tab="email">Email</button>
            <button class="tab" data-tab="security">Sécurité</button>
          </div>

          <div class="tab-content active" data-tab-content="general">
            <div class="card">
              <h3 class="card-title mb-md">Informations générales</h3>
              <form>
                <div class="form-group"><label class="form-label">Nom de la plateforme</label><input type="text" class="form-input" value="Cultulangues"></div>
                <div class="form-group"><label class="form-label">Email de contact</label><input type="email" class="form-input" value="contact@cultulangues.fr"></div>
                <div class="form-group"><label class="form-label">Devise</label><select class="form-select"><option>EUR (€)</option><option>CAD ($)</option></select></div>
                <div class="form-group"><label class="form-label">Fuseau horaire</label><select class="form-select"><option>Europe/Paris (UTC+1)</option></select></div>
                <button class="btn btn-primary">Enregistrer</button>
              </form>
            </div>
          </div>

          <div class="tab-content" data-tab-content="payment">
            <div class="card">
              <h3 class="card-title mb-md">Configuration des paiements</h3>
              <form>
                <div class="form-group"><label class="form-label">Moyens de paiement acceptés</label>
                  <div style="display: flex; flex-direction: column; gap: var(--space-sm);">
                    <label class="form-checkbox"><input type="checkbox" checked> Carte bancaire (Visa, Mastercard)</label>
                    <label class="form-checkbox"><input type="checkbox" checked> PayPal</label>
                    <label class="form-checkbox"><input type="checkbox"> Virement bancaire</label>
                  </div>
                </div>
                <div class="form-group"><label class="form-label">Frais de service (%)</label><input type="number" class="form-input" value="2.5" step="0.1"></div>
                <button class="btn btn-primary">Enregistrer</button>
              </form>
            </div>
          </div>

          <div class="tab-content" data-tab-content="email">
            <div class="card">
              <h3 class="card-title mb-md">Notifications email</h3>
              <div style="display: flex; flex-direction: column; gap: var(--space-sm);">
                <label class="form-checkbox"><input type="checkbox" checked> Confirmation d'inscription</label>
                <label class="form-checkbox"><input type="checkbox" checked> Rappel de séance (24h avant)</label>
                <label class="form-checkbox"><input type="checkbox" checked> Facture disponible</label>
                <label class="form-checkbox"><input type="checkbox" checked> Résultat de test</label>
                <label class="form-checkbox"><input type="checkbox"> Newsletter</label>
              </div>
              <button class="btn btn-primary mt-md">Enregistrer</button>
            </div>
          </div>

          <div class="tab-content" data-tab-content="security">
            <div class="card">
              <h3 class="card-title mb-md">Sécurité</h3>
              <form>
                <div class="form-group"><label class="form-label">Email administrateur</label><input type="email" class="form-input" value="admin@cultulangues.fr"></div>
                <div class="form-group"><label class="form-label">Mot de passe actuel</label><input type="password" class="form-input" value="••••••••"></div>
                <div class="form-group"><label class="form-label">Nouveau mot de passe</label><input type="password" class="form-input" placeholder="Minimum 8 caractères"></div>
                <button class="btn btn-primary">Mettre à jour</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/main.js"></script>
</body>
</html>
