<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="auth.login.page.title">Login — School Management</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --pink:#FF6B9D;--orange:#FF8E53;--yellow:#FFD93D;--blue:#4A90D9;--green:#2ECC71;
      --bg:#F4F6FA;--text:#2C3E50;--text-secondary:#7F8C8D;--border:#E8ECF1;
      --shadow-lg:0 20px 60px rgba(0,0,0,0.08);--radius-lg:20px;--radius-md:12px;--radius-full:9999px;
      --transition:300ms cubic-bezier(0.4,0,0.2,1);--font:'Inter',sans-serif;
    }
    html{font-size:15px}
    body{font-family:var(--font);background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
    body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 20%,rgba(255,107,157,0.03) 0%,transparent 50%),radial-gradient(circle at 70% 80%,rgba(74,144,217,0.03) 0%,transparent 50%);pointer-events:none;z-index:0}

    .login-wrap{position:relative;z-index:1;width:100%;max-width:440px;animation:fadeInUp 0.5s ease}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

    .login-card{background:white;border-radius:var(--radius-lg);padding:40px;box-shadow:var(--shadow-lg);border:1px solid var(--border)}
    .login-brand{text-align:center;margin-bottom:32px}
    .login-brand-icon{width:52px;height:52px;border-radius:var(--radius-md);background:linear-gradient(135deg,var(--pink),var(--orange),var(--yellow));display:flex;align-items:center;justify-content:center;color:white;font-size:1.4rem;font-weight:800;margin:0 auto 12px}
    .login-brand h1{font-size:1.25rem;font-weight:800;background:linear-gradient(135deg,var(--pink),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .login-brand p{font-size:0.82rem;color:var(--text-secondary);margin-top:4px}

    .form-group{margin-bottom:20px}
    .form-group label{display:block;font-size:0.78rem;font-weight:600;color:var(--text);margin-bottom:6px}
    .form-control{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:var(--radius-md);font-size:0.9rem;outline:none;transition:all var(--transition);font-family:var(--font);background:var(--bg);color:var(--text)}
    .form-control:focus{border-color:var(--pink);box-shadow:0 0 0 4px rgba(255,107,157,0.1);background:white}
    .input-icon-wrap{position:relative}
    .input-icon-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-secondary);font-size:0.9rem}
    .input-icon-wrap .form-control{padding-left:40px}

    .role-selector{margin-bottom:24px}
    .role-selector label{display:block;font-size:0.78rem;font-weight:600;color:var(--text);margin-bottom:8px}
    .role-options{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .role-option{cursor:pointer;padding:12px 8px;border:1.5px solid var(--border);border-radius:var(--radius-md);text-align:center;transition:all var(--transition);background:var(--bg)}
    .role-option:hover{border-color:var(--blue);background:rgba(74,144,217,0.04)}
    .role-option.active{border-color:var(--pink);background:rgba(255,107,157,0.06);box-shadow:0 0 0 4px rgba(255,107,157,0.08)}
    .role-option i{font-size:1.3rem;display:block;margin-bottom:4px;color:var(--text-secondary)}
    .role-option.active i{color:var(--pink)}
    .role-option span{font-size:0.72rem;font-weight:600;color:var(--text-secondary);display:block}
    .role-option.active span{color:var(--text)}

    .login-btn{width:100%;padding:14px;border:none;border-radius:var(--radius-md);background:linear-gradient(135deg,var(--pink),var(--orange));color:white;font-size:0.9rem;font-weight:700;cursor:pointer;transition:all var(--transition);font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:8px}
    .login-btn:hover{box-shadow:0 8px 24px rgba(255,107,157,0.3);transform:translateY(-1px)}
    .login-btn:active{transform:translateY(0)}
    .login-btn i{font-size:0.8rem}

    .login-footer{text-align:center;margin-top:20px;font-size:0.78rem;color:var(--text-secondary)}
    .login-footer a{color:var(--pink);text-decoration:none;font-weight:600}
    .login-footer a:hover{text-decoration:underline}

    .demo-info{background:rgba(255,179,71,0.08);border:1px solid rgba(255,179,71,0.2);border-radius:var(--radius-md);padding:12px 16px;margin-bottom:24px;font-size:0.75rem;color:var(--text)}
    .demo-info strong{display:block;margin-bottom:4px;font-size:0.78rem;color:#B8860B}
    .demo-info span{color:var(--text-secondary)}
    .demo-info code{background:rgba(255,179,71,0.1);padding:1px 6px;border-radius:4px;font-size:0.7rem}

    @media(max-width:480px){
      .login-card{padding:28px 24px}
      .role-options{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-brand-icon">S</div>
        <h1 data-i18n="auth.login.title">School Management</h1>
        <p data-i18n="auth.login.subtitle">Sign in to access your dashboard</p>
      </div>

      <div class="demo-info">
        <strong data-i18n="auth.login.demo.title"><i class="fas fa-info-circle"></i> Demo Mode</strong>
        <span data-i18n="auth.login.demo.text">Select a role and click <strong>Sign In</strong> to access the corresponding dashboard.</span>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label data-i18n="auth.login.email">Email or Username</label>
          <div class="input-icon-wrap">
            <i class="fas fa-envelope"></i>
            <input class="form-control" type="text" data-i18n-placeholder="auth.login.email.placeholder" placeholder="Enter your email" value="admin@school.com" required>
          </div>
        </div>
        <div class="form-group">
          <label data-i18n="auth.login.password">Password</label>
          <div class="input-icon-wrap">
            <i class="fas fa-lock"></i>
            <input class="form-control" type="password" data-i18n-placeholder="auth.login.password.placeholder" placeholder="Enter your password" value="••••••••" required>
          </div>
        </div>

        <div class="role-selector">
          <label data-i18n="auth.login.role.label">I am a...</label>
          <div class="role-options">
            <div class="role-option active" data-role="admin" onclick="selectRole(this)">
              <i class="fas fa-user-shield"></i>
              <span data-i18n="auth.login.role.admin">Admin</span>
            </div>
            <div class="role-option" data-role="teacher" onclick="selectRole(this)">
              <i class="fas fa-chalkboard-teacher"></i>
              <span data-i18n="auth.login.role.teacher">Teacher</span>
            </div>
            <div class="role-option" data-role="student" onclick="selectRole(this)">
              <i class="fas fa-user-graduate"></i>
              <span data-i18n="auth.login.role.student">Student</span>
            </div>
          </div>
        </div>

        <button class="login-btn" type="submit">
          <span data-i18n="auth.login.signin">Sign In</span>
          <i class="fas fa-arrow-right"></i>
        </button>
      </form>

      <div class="login-footer">
        <a href="../index.html" data-i18n="auth.login.back">← Back to Home</a>
      </div>
    </div>
  </div>

  <script>
    var selectedRole = 'admin';

    function selectRole(el) {
      document.querySelectorAll('.role-option').forEach(function(r){r.classList.remove('active')});
      el.classList.add('active');
      selectedRole = el.getAttribute('data-role');
    }

    function handleLogin(e) {
      e.preventDefault();
      var btn = document.querySelector('.login-btn');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
      btn.disabled = true;

      var redirects = {
        admin: '../admin/index.html',
        teacher: '../teacher/index.html',
        student: '../student/index.html'
      };

      setTimeout(function(){
        window.location.href = redirects[selectedRole] || '../admin/index.html';
      }, 1200);
    }
  </script>

<script src="../js/main.js"></script>
</body>
</html>
